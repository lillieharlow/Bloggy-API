name: Deploy to AWS ECS

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  schedule:
    - cron: '30 4 * * 1' # Every Monday at 04:30 UTC
  workflow_dispatch:  # Manual trigger for testing

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    # Only run if CI succeeded or event is schedule/manual
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      DEPLOY_ENV: production
      DEPLOY_COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      # Download exact commit that triggered CI
      - name: Checkout source code for triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_COMMIT_SHA }}

      - name: Download CI artifacts from triggering run
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: ci-artifacts
          merge-multiple: true

      - name: Setup Node.js for metadata/versioning
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Config AWS CLI creds and region for all AWS commands
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Authenticate Docker with Amazon ECR
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Resolve image tags
        run: |
          set -euo pipefail
          APP_VERSION="$(node -p "require('./package.json').version")"
          COMMIT_SHA="$DEPLOY_COMMIT_SHA"
          SHORT_SHA="${COMMIT_SHA:0:8}"

          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"

      - name: Build deployment metadata
        run: |
          set -euo pipefail
          cat > deployment-metadata.json <<EOF
          {
            "environment": "$DEPLOY_ENV",
            "appVersion": "$APP_VERSION",
            "shortSha": "$SHORT_SHA",
            "fullSha": "$DEPLOY_COMMIT_SHA",
            "sourceEvent": "${{ github.event_name }}",
            "sourceWorkflowRunId": "${{ github.event.workflow_run.id || '' }}"
          }
          EOF

      # Build Docker image with latest code
      # Tag env, version, and short commit SHA. Push to ECR
      - name: Build, tag, and push Docker image to ECR
        run: |
          set -euo pipefail
          BASE_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY"
          IMAGE_ENV="$BASE_IMAGE:$DEPLOY_ENV"
          IMAGE_VERSION="$BASE_IMAGE:v$APP_VERSION"
          IMAGE_SHA="$BASE_IMAGE:sha-$SHORT_SHA"

          docker build -t "$IMAGE_ENV" .
          docker tag "$IMAGE_ENV" "$IMAGE_VERSION"
          docker tag "$IMAGE_ENV" "$IMAGE_SHA"

          docker push "$IMAGE_ENV"
          docker push "$IMAGE_VERSION"
          docker push "$IMAGE_SHA"

      # Trigger ECS to pull new image and redeploy
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}

      - name: Upload deployment metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-metadata
          path: deployment-metadata.json
          retention-days: 30