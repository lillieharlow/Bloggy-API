name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '15 3 * * 0'  # Every Sunday at 1:15pm Melbourne (AEST/AEDT)
  workflow_dispatch:  # manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
    env:
      MONGODB_TEST_URI: mongodb://localhost:27017/bloggy_test
      JWT_SECRET: test-secret
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci

      # Linting
      - run: npm run lint

      # Install jest-junit for JUnit test reporting
      - run: npm install jest-junit --no-save

      # Run jest tests, output junit xml
      - run: npm test -- --ci --testResultsProcessor=jest-junit

      # Upload test results as artifact
      - uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

      # Coverage
      - run: npm run test:coverage

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/