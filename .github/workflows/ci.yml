name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '15 3 * * 0'  # Every Sunday at 1:15pm Melbourne (AEST/AEDT)
  workflow_dispatch:  # manual trigger

permissions:
  contents: read

env:
  NODE_VERSION: '24'
  TEST_RESULTS_FILE: test-results.xml
  COVERAGE_DIR: coverage
  TEST_SUMMARY_FILE: ci-test-summary.log

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
    env:
      MONGODB_TEST_URI: mongodb://localhost:27017/bloggy_test
      JWT_SECRET: test-secret
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint codebase
        run: npm run lint

      - name: Run test suite with JUnit output
        run: npm test -- --ci

      - name: Build custom CI test summary log
        run: |
          set -euo pipefail
          {
            echo "CI Test Summary"
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Run ID: $GITHUB_RUN_ID"
            echo "Commit: $GITHUB_SHA"
            echo "Timestamp (UTC): $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            if [[ -f "$TEST_RESULTS_FILE" ]]; then
              echo "JUnit report: generated ($TEST_RESULTS_FILE)"
            else
              echo "JUnit report: missing"
            fi
          } > "$TEST_SUMMARY_FILE"

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            ${{ env.TEST_RESULTS_FILE }}
            ${{ env.TEST_SUMMARY_FILE }}
          retention-days: 30

      - name: Run coverage suite
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ${{ env.COVERAGE_DIR }}/
          retention-days: 30

      - name: Export workflow definitions artifact
        uses: actions/upload-artifact@v4
        with:
          name: workflow-definitions
          path: .github/workflows/*.yml
          retention-days: 30